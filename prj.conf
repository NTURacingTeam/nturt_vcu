# compiler
CONFIG_DEBUG_OPTIMIZATIONS=y
CONFIG_ASSERT=y

# hardware
CONFIG_FPU=y
CONFIG_DMA=y

# kernel
## debug
CONFIG_DEBUG=y
CONFIG_PRINTK=y

## memory
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=8192

## workqueue
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

## logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_LOG_PROCESS_THREAD_SLEEP_MS=100

## tracing
# CONFIG_TRACING=y

### sysview
# CONFIG_SEGGER_SYSTEMVIEW=y
# CONFIG_SEGGER_SYSVIEW_RTT_BUFFER_SIZE=32768

## main thread
CONFIG_MAIN_STACK_SIZE=4096

# nturt
## usb
CONFIG_NTURT_USB=y
CONFIG_NTURT_USB_PID=0x0001
CONFIG_NTURT_USB_PRODUCT_STRING="Vehicle Control Unit"

# vcu
CONFIG_VCU_SOURCE_IMU_CANOPEN=y
# CONFIG_VCU_CTRL_ALGO_DUMB=y
## sys
CONFIG_VCU_SYS=y
CONFIG_VCU_SHELL=y

## message
CONFIG_VCU_MSG=y

## telemetry
CONFIG_VCU_TM=y

## canopen
CONFIG_VCU_CANOPEN=y

## command
# CONFIG_NTURT_CMD=y
# NTURT_CMD_PROCESS_THREAD_PRIORITY=10

## perception
CONFIG_VCU_PERCEPTION=y

## control
CONFIG_VCU_CTRL=y

## dashboard
CONFIG_VCU_DASHBOARD=y

## hil
CONFIG_VCU_HIL=n
